# OPT family (Meta)

mapping:
  embed.tokens: model.decoder.embed_tokens
  embed.position: model.decoder.embed_positions

  layers.{i}.attention.layer_norm: model.decoder.layers.{i}.self_attn_layer_norm
  layers.{i}.attention.q: model.decoder.layers.{i}.self_attn.q_proj
  layers.{i}.attention.k: model.decoder.layers.{i}.self_attn.k_proj
  layers.{i}.attention.v: model.decoder.layers.{i}.self_attn.v_proj
  layers.{i}.attention.out_proj: model.decoder.layers.{i}.self_attn.out_proj

  layers.{i}.mlp.layer_norm: model.decoder.layers.{i}.final_layer_norm
  layers.{i}.mlp.up_proj: model.decoder.layers.{i}.fc1
  layers.{i}.mlp.down_proj: model.decoder.layers.{i}.fc2

  layer_norm_final: model.decoder.final_layer_norm
  unembed: lm_head
