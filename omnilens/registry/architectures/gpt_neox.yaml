# GPT-NeoX / Pythia family (EleutherAI)
# Note: uses fused query_key_value projection

mapping:
  embed.tokens: gpt_neox.embed_in

  layers.{i}.attention.layer_norm: gpt_neox.layers.{i}.input_layernorm
  layers.{i}.attention.q: gpt_neox.layers.{i}.attention.query_key_value  # fused QKV
  layers.{i}.attention.out_proj: gpt_neox.layers.{i}.attention.dense

  layers.{i}.mlp.layer_norm: gpt_neox.layers.{i}.post_attention_layernorm
  layers.{i}.mlp.up_proj: gpt_neox.layers.{i}.mlp.dense_h_to_4h
  layers.{i}.mlp.down_proj: gpt_neox.layers.{i}.mlp.dense_4h_to_h

  layer_norm_final: gpt_neox.final_layer_norm
  unembed: embed_out
