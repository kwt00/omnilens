# GPT-2 family

mapping:
  # Embeddings
  embed.tokens: transformer.wte
  embed.position: transformer.wpe

  # Per-layer components
  layers.{i}.attention.layer_norm: transformer.h.{i}.ln_1
  layers.{i}.attention.q: transformer.h.{i}.attn.c_attn  # fused QKV — needs special handling
  layers.{i}.attention.out_proj: transformer.h.{i}.attn.c_proj

  layers.{i}.mlp.layer_norm: transformer.h.{i}.ln_2
  layers.{i}.mlp.up_proj: transformer.h.{i}.mlp.c_fc
  layers.{i}.mlp.down_proj: transformer.h.{i}.mlp.c_proj

  # Output
  layer_norm_final: transformer.ln_f
  unembed: lm_head
